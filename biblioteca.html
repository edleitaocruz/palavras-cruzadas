<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Palavras Cruzadas — Biblioteca</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg-base:#f5f5f3;--bg-surface:#fff;--bg-raised:#f0efed;--bg-input:#fafaf8;
  --border:#e2e0db;--border-sub:#ece9e3;--text-1:#1a1a18;--text-2:#6b6b68;--text-3:#b0afa9;
  --accent:#185FA5;--accent-soft:#e6f1fb;
}
html.dark{
  --bg-base:#0d0d0d;--bg-surface:#151515;--bg-raised:#1a1a1a;--bg-input:#111;
  --border:#282828;--border-sub:#1e1e1e;--text-1:#efefef;--text-2:#999;--text-3:#484848;
  --accent-soft:#0c2a45;
}
body{font-family:'Inter',sans-serif;background:var(--bg-base);color:var(--text-1);min-height:100vh;font-size:14px;}

.header{background:var(--bg-surface);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;gap:12px;}
.app-title{font-size:15px;font-weight:600;letter-spacing:-.3px;}
.app-role{font-size:11px;font-weight:500;color:var(--text-3);background:var(--bg-raised);border:1px solid var(--border);border-radius:10px;padding:2px 8px;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.icon-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--bg-raised);color:var(--text-2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background .12s;}
.icon-btn:hover{background:var(--border);color:var(--text-1);}

.main{max-width:860px;margin:0 auto;padding:32px 24px;}

.page-title{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:6px;}
.page-sub{font-size:13px;color:var(--text-2);margin-bottom:28px;}

.loading{display:flex;align-items:center;gap:8px;color:var(--text-3);font-size:13px;padding:40px 0;}
.loading i{font-size:20px;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{text-align:center;padding:60px 0;color:var(--text-3);}
.empty i{font-size:40px;margin-bottom:12px;display:block;}
.empty p{font-size:14px;}

/* Puzzle cards */
.puzzle-list{display:flex;flex-direction:column;gap:10px;}

.puzzle-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;display:flex;align-items:center;gap:16px;transition:border-color .15s,box-shadow .15s;cursor:pointer;}
.puzzle-card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(24,95,165,.1);}

.puzzle-num{font-size:22px;font-weight:700;color:var(--text-1);min-width:52px;letter-spacing:-.5px;}
.puzzle-num span{font-size:11px;font-weight:500;color:var(--text-3);display:block;letter-spacing:.5px;}

.puzzle-info{flex:1;}
.puzzle-date{font-size:12px;color:var(--text-3);margin-bottom:4px;}
.puzzle-clues{font-size:12px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:380px;}

.puzzle-status{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.status-draft{background:var(--bg-raised);color:var(--text-3);border:1px solid var(--border);}
.status-waiting{background:#0c2a45;color:#6aa9d8;border:1px solid #1a4a6a;}
.status-success{background:#1a3a1a;color:#6fcf6f;border:1px solid #2d5a2d;}
.status-incomplete{background:#3a2e0a;color:#f5c842;border:1px solid #5a4610;}
.status-wrong{background:#3a1a1a;color:#f07070;border:1px solid #5a2a2a;}

.puzzle-actions{display:flex;gap:6px;align-items:center;}

.btn{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg-raised);color:var(--text-1);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:background .1s;white-space:nowrap;}
.btn:hover{background:var(--border);}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn.primary:hover{background:#1451a0;}
.btn.danger{background:transparent;color:#f07070;border-color:#5a2a2a;}
.btn.danger:hover{background:#3a1a1a;}

/* Confirm delete overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;display:none;}
.overlay.open{display:flex;}
.modal{background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:28px;max-width:380px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.modal h2{font-size:16px;font-weight:700;margin-bottom:8px;}
.modal p{font-size:13px;color:var(--text-2);margin-bottom:22px;line-height:1.5;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text-1);color:var(--bg-base);border-radius:8px;padding:9px 18px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <span class="app-title">Palavras Cruzadas</span>
    <span class="app-role">Biblioteca</span>
    <div class="header-right">
      <button class="icon-btn" onclick="toggleDark()" id="theme-btn" title="Alternar tema"><i class="ti ti-moon"></i></button>
    </div>
  </div>
  <div class="main">
    <div class="page-title">Biblioteca de Puzzles</div>
    <div class="page-sub">Todos os puzzles guardados. Clica num puzzle para abrir no Revisor.</div>
    <div id="list-wrap"><div class="loading"><i class="ti ti-loader-2"></i> A carregar puzzles...</div></div>
  </div>
</div>

<!-- Delete confirm modal -->
<div class="overlay" id="delete-overlay">
  <div class="modal">
    <h2>Eliminar Puzzle</h2>
    <p id="delete-msg">Tens a certeza que queres eliminar este puzzle? Esta ação não pode ser desfeita.</p>
    <div class="modal-actions">
      <button class="btn" onclick="closeDeleteModal()">Cancelar</button>
      <button class="btn danger" onclick="confirmDelete()"><i class="ti ti-trash"></i> Eliminar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL='https://tqlcqsuraqhpdwrqbpoh.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxbGNxc3VyYXFocGR3cnFicG9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDUzNDUsImV4cCI6MjA5MzQ4MTM0NX0.Vn3YuXVsZPql_YGPjxR-IM5CVlI_6DeojivxMp92GDQ';
const HEADERS={'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};

let isDark=false;
let puzzles=[];
let deleteId=null;
let toastTimer=null;

function toggleDark(){
  isDark=!isDark;
  document.documentElement.classList.toggle('dark',isDark);
  document.querySelector('#theme-btn i').className=isDark?'ti ti-sun':'ti ti-moon';
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}

function statusBadge(row){
  if(!row.creator_approved) return `<span class="puzzle-status status-draft"><i class="ti ti-pencil"></i> Rascunho</span>`;
  if(!row.solver_approved) return `<span class="puzzle-status status-waiting"><i class="ti ti-clock"></i> Aguarda revisor</span>`;
  if(row.solver_status==='success') return `<span class="puzzle-status status-success"><i class="ti ti-check"></i> Aprovado</span>`;
  if(row.solver_status==='incomplete') return `<span class="puzzle-status status-incomplete"><i class="ti ti-circle-dashed"></i> Incompleto</span>`;
  if(row.solver_status==='wrong') return `<span class="puzzle-status status-wrong"><i class="ti ti-x"></i> Com erros</span>`;
  return `<span class="puzzle-status status-success"><i class="ti ti-check"></i> Aprovado</span>`;
}

function formatDate(iso){
  if(!iso) return '';
  const d=new Date(iso);
  return d.toLocaleDateString('pt-PT',{day:'2-digit',month:'short',year:'numeric'});
}

function cluePreview(row){
  const ci=row.clue_inputs||{};
  const keys=Object.keys(ci).slice(0,3);
  if(!keys.length) return 'Sem definições';
  return keys.map(k=>`${k}: ${ci[k]}`).join(' · ')+'…';
}

function openInRevisor(id){
  const base=window.location.href.replace('biblioteca.html','revisor.html');
  window.open(`${base}?id=${encodeURIComponent(id)}`,'_blank');
}

function openDeleteModal(id){
  deleteId=id;
  document.getElementById('delete-msg').textContent=`Tens a certeza que queres eliminar o Puzzle #${id}? Esta ação não pode ser desfeita.`;
  document.getElementById('delete-overlay').classList.add('open');
}

function closeDeleteModal(){
  deleteId=null;
  document.getElementById('delete-overlay').classList.remove('open');
}

async function confirmDelete(){
  if(!deleteId) return;
  const id=deleteId;
  closeDeleteModal();
  const res=await fetch(`${SUPA_URL}/rest/v1/palavras_cruzadas?id=eq.${encodeURIComponent(id)}`,{
    method:'DELETE',
    headers:HEADERS
  });
  if(res.ok){
    showToast(`Puzzle #${id} eliminado`);
    await loadPuzzles();
  } else {
    alert('Erro ao eliminar.');
  }
}

function renderList(){
  const wrap=document.getElementById('list-wrap');
  if(!puzzles.length){
    wrap.innerHTML=`<div class="empty"><i class="ti ti-books"></i><p>Ainda não há puzzles guardados.</p></div>`;
    return;
  }
  const html=puzzles.map(row=>`
    <div class="puzzle-card" onclick="openInRevisor('${row.id}')">
      <div class="puzzle-num">#${row.id}<span>Puzzle</span></div>
      <div class="puzzle-info">
        <div class="puzzle-date"><i class="ti ti-calendar" style="font-size:11px;margin-right:3px;"></i>${formatDate(row.updated_at||row.created_at)}</div>
        <div class="puzzle-clues">${cluePreview(row)}</div>
      </div>
      ${statusBadge(row)}
      <div class="puzzle-actions" onclick="event.stopPropagation()">
        <button class="btn primary" onclick="openInRevisor('${row.id}')"><i class="ti ti-external-link"></i> Abrir</button>
        <button class="btn danger" onclick="openDeleteModal('${row.id}')"><i class="ti ti-trash"></i></button>
      </div>
    </div>
  `).join('');
  wrap.innerHTML=`<div class="puzzle-list">${html}</div>`;
}

async function loadPuzzles(){
  document.getElementById('list-wrap').innerHTML=`<div class="loading"><i class="ti ti-loader-2"></i> A carregar puzzles...</div>`;
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/palavras_cruzadas?select=id,creator_approved,solver_approved,solver_status,clue_inputs,created_at,updated_at&order=id.desc`,{headers:HEADERS});
    if(!res.ok){document.getElementById('list-wrap').innerHTML=`<div class="empty"><i class="ti ti-wifi-off"></i><p>Erro ao carregar puzzles.</p></div>`;return;}
    puzzles=await res.json();
    renderList();
  } catch(e){
    document.getElementById('list-wrap').innerHTML=`<div class="empty"><i class="ti ti-wifi-off"></i><p>Sem ligação à base de dados.</p></div>`;
  }
}

// Close modal on overlay click
document.getElementById('delete-overlay').addEventListener('click',e=>{
  if(e.target===e.currentTarget) closeDeleteModal();
});

loadPuzzles();
</script>
</body>
</html>
